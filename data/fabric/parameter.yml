# fabric-cicd parameter.yml
#
# Environment-specific configuration for deploy-time parameterization.
# Variable Libraries handle most runtime config (workspace IDs, lakehouse names).
# Updated: 2026-04-18
#
# Add find_replace or key_value_replace rules here for values that must be
# rewritten before items are uploaded to the workspace.
#
# Environment keys must match the 'environment' input passed to fabric-cicd: Test, Prod
# The _ALL_ key applies the same replacement to any target environment.
#
# Dynamic replacement variables (resolved at deploy time):
#   $items.<ItemType>.<ItemName>.$id  — item ID in the target workspace
#   $workspace.$id                    — target workspace ID
#
# Reference: https://microsoft.github.io/fabric-cicd/latest/how_to/parameterization/

find_replace:
    # Replace Dev lakehouse ID with the actual lakehouse ID in the target workspace.
    # fabric-cicd deploys the Lakehouse before the Variable Library, so the ID
    # is guaranteed to be available when this replacement runs.
    - find_value: "c185283c-9dd9-4e40-a17c-aa6303e3a2e9"
      replace_value:
          _ALL_: "$items.Lakehouse.PatternsLakehouse.$id"
      item_type: "VariableLibrary"

    # Replace Dev workspace ID in Semantic Model Direct Lake connection.
    - find_value: "d7270f11-feba-4990-baa6-d45e47f23737"
      replace_value:
          _ALL_: "$workspace.$id"
      item_type: "SemanticModel"

    # Replace Dev lakehouse ID in Semantic Model Direct Lake connection.
    - find_value: "c185283c-9dd9-4e40-a17c-aa6303e3a2e9"
      replace_value:
          _ALL_: "$items.Lakehouse.PatternsLakehouse.$id"
      item_type: "SemanticModel"

    # Replace Dev lakehouse ID in Notebook default_lakehouse dependency.
    - find_value: "c185283c-9dd9-4e40-a17c-aa6303e3a2e9"
      replace_value:
          _ALL_: "$items.Lakehouse.PatternsLakehouse.$id"
      item_type: "Notebook"

    # Replace Dev workspace ID in Notebook default_lakehouse_workspace_id.
    - find_value: "d7270f11-feba-4990-baa6-d45e47f23737"
      replace_value:
          _ALL_: "$workspace.$id"
      item_type: "Notebook"

    # Replace Lakehouse logicalId in Ontology DataBindings and Contextualizations.
    # Ontology uses the .platform logicalId (not the actual dev lakehouse ID).
    - find_value: "b36b3bda-0782-a846-4a40-deb97694ebac"
      replace_value:
          _ALL_: "$items.Lakehouse.PatternsLakehouse.$id"
      item_type: "Ontology"
