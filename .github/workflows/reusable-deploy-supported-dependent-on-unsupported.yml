# Reusable workflow: Deploy supported items that depend on unsupported items.
#
# SKELETON — Not yet implemented.
#
# This is Job 3 of the sandwich pattern. Reserved for future supported items
# that can only be deployed after unsupported items (promoted in Job 2) are
# already present in the target workspace.
#
# Note: Ontology and DataAgent are now deployed via fabric-cicd (Job 1) using
# logicalId references, so this skeleton has no current consumers.
#
# Called by: deploy-prod.yml (after promote-unsupported succeeds)
#
# Future implementation:
#   - Call fabric-cicd with item_type_in_scope limited to the specific item types
#     that depend on unsupported items
#   - This ensures dependent items find their dependencies already in the workspace
#
# When all items gain Git integration and fabric-cicd support, this step and
# the unsupported step can be removed — simplifying to a single fabric-cicd deploy.

name: "Reusable: Deploy Supported Items Dependent on Unsupported"

on:
  workflow_call:
    inputs:
      environment:
        description: "Target environment (test, prod)"
        required: true
        type: string
      repository_directory:
        description: "Path to the Fabric item definitions"
        required: false
        type: string
        default: "data/fabric"

permissions:
  contents: read

jobs:
  deploy-dependent:
    name: Deploy dependent supported items (${{ inputs.environment }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: ${{ inputs.environment }}
    steps:
      - name: Placeholder
        env:
          ENVIRONMENT: ${{ inputs.environment }}
        run: |
          echo "TODO: Deploy supported items dependent on unsupported items via fabric-cicd for $ENVIRONMENT"
          echo "This step will call fabric-cicd with item_type_in_scope limited to dependent item types once implemented."
